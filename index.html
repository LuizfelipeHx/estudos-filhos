<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Missão Prova — Mario</title>
<meta name="theme-color" content="#dc2626">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --azul:#3b82f6; --roxo:#8b5cf6; --rosa:#ec4899; --verde:#22c55e;
    --amarelo:#facc15; --laranja:#fb923c; --vermelho:#ef4444; --ciano:#06b6d4;
    --fundo:#0f172a; --card:#1e293b; --card2:#334155; --texto:#f1f5f9; --suave:#94a3b8;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  body{
    font-family:'Segoe UI', system-ui, sans-serif;
    background:
      radial-gradient(circle at 12% 0%, rgba(220,38,38,.32), transparent 42%),
      radial-gradient(circle at 88% 8%, rgba(251,191,36,.16), transparent 42%),
      linear-gradient(160deg,#0a0a0f,#1a0e12 55%,#2a0a0a);
    background-attachment:fixed; color:var(--texto); min-height:100vh; padding-bottom:40px; overflow-x:hidden;
  }
  .wrap{max-width:760px; margin:0 auto; padding:16px;}

  /* CABEÇALHO */
  header{text-align:center; padding:18px 0 10px;}
  header h1{font-size:30px; line-height:1.1; text-shadow:0 2px 12px rgba(139,92,246,.6);}
  header p{color:var(--suave); margin-top:6px; font-size:14px;}

  /* XP / NÍVEL */
  .topbar{display:flex; gap:10px; align-items:center; justify-content:center; margin-top:12px; flex-wrap:wrap;}
  .pill{background:var(--card); border:1px solid var(--card2); border-radius:999px; padding:6px 14px; font-size:14px; font-weight:600; display:flex; align-items:center; gap:6px;}
  .pill .big{font-size:18px;}

  /* PRÓXIMA PROVA */
  .next{background:linear-gradient(135deg,var(--rosa),var(--laranja)); border-radius:20px; padding:18px; margin:18px 0; text-align:center; box-shadow:0 8px 24px rgba(236,72,153,.35);}
  .next .label{font-size:13px; text-transform:uppercase; letter-spacing:1px; opacity:.9;}
  .next .mat{font-size:26px; font-weight:800; margin:4px 0;}
  .next .dias{font-size:15px; font-weight:600;}
  .next .dias b{font-size:22px;}

  /* GRID DE MATÉRIAS */
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media(max-width:520px){.grid{grid-template-columns:1fr;}}
  .subj{border:none; border-radius:18px; padding:16px; cursor:pointer; text-align:left; color:#fff; position:relative; overflow:hidden; transition:transform .15s, box-shadow .15s; box-shadow:0 6px 16px rgba(0,0,0,.3);}
  .subj:active{transform:scale(.97);}
  .subj:hover{transform:translateY(-3px); box-shadow:0 12px 24px rgba(0,0,0,.4);}
  .subj .ico{font-size:34px;}
  .subj .nm{font-size:19px; font-weight:800; margin-top:6px;}
  .subj .dt{font-size:12px; opacity:.92; margin-top:2px; font-weight:600;}
  .bar{height:8px; background:rgba(255,255,255,.3); border-radius:999px; margin-top:12px; overflow:hidden;}
  .bar > div{height:100%; background:#fff; border-radius:999px; width:0%; transition:width .5s;}
  .subj .pct{font-size:12px; font-weight:700; margin-top:5px;}

  /* TELA DE MATÉRIA */
  .screen{display:none;}
  .screen.active{display:block; animation:fade .3s;}
  @keyframes fade{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}
  .back{background:var(--card); border:1px solid var(--card2); color:var(--texto); border-radius:12px; padding:8px 14px; font-size:14px; font-weight:600; cursor:pointer; margin-bottom:14px;}
  .subj-head{border-radius:18px; padding:16px; color:#fff; margin-bottom:14px; box-shadow:0 6px 16px rgba(0,0,0,.3);}
  .subj-head .ico{font-size:38px;}
  .subj-head h2{font-size:24px; font-weight:800;}
  .subj-head .dt{font-size:13px; opacity:.92; margin-top:3px; font-weight:600;}

  /* ABAS */
  .tabs{display:flex; gap:8px; margin-bottom:14px;}
  .tab{flex:1; background:var(--card); border:1px solid var(--card2); color:var(--suave); border-radius:12px; padding:10px 4px; font-size:14px; font-weight:700; cursor:pointer; transition:.15s;}
  .tab.on{background:var(--roxo); color:#fff; border-color:var(--roxo);}

  .panel{display:none;}
  .panel.on{display:block;}

  /* CHECKLIST */
  .topic{display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--card2); border-radius:14px; padding:14px; margin-bottom:10px; cursor:pointer; transition:.15s;}
  .topic:hover{border-color:var(--roxo);}
  .check{width:28px; height:28px; border-radius:8px; border:2px solid var(--suave); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:16px; transition:.15s;}
  .topic .txt{font-size:15px; line-height:1.3;}
  .status{margin-left:auto; font-size:11px; font-weight:800; color:var(--suave); white-space:nowrap; text-transform:uppercase; letter-spacing:.5px;}
  /* nível 1: mais ou menos */
  .topic.lvl1{background:linear-gradient(90deg,rgba(250,204,21,.16),var(--card)); border-color:var(--amarelo);}
  .topic.lvl1 .check{background:var(--amarelo); border-color:var(--amarelo); color:#1e293b;}
  .topic.lvl1 .status{color:var(--amarelo);}
  /* nível 2: manjo! */
  .topic.lvl2{background:linear-gradient(90deg,rgba(34,197,94,.18),var(--card)); border-color:var(--verde);}
  .topic.lvl2 .check{background:var(--verde); border-color:var(--verde); color:#fff;}
  .topic.lvl2 .status{color:var(--verde);}
  .legenda{font-size:12px; color:var(--suave); background:var(--card); border:1px solid var(--card2); border-radius:12px; padding:11px 13px; margin-bottom:12px; line-height:1.6;}

  /* FLASHCARDS */
  .fc-area{text-align:center;}
  .flashcard{perspective:1200px; height:280px; margin-bottom:14px; cursor:pointer;}
  .fc-inner{position:relative; width:100%; height:100%; transition:transform .5s; transform-style:preserve-3d;}
  .flashcard.flip .fc-inner{transform:rotateY(180deg);}
  .fc-face{position:absolute; width:100%; height:100%; backface-visibility:hidden; border-radius:20px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; box-shadow:0 8px 24px rgba(0,0,0,.35);}
  .fc-front{background:linear-gradient(135deg,var(--azul),var(--ciano));}
  .fc-back{background:linear-gradient(135deg,var(--verde),#15803d); transform:rotateY(180deg);}
  .fc-tag{font-size:12px; text-transform:uppercase; letter-spacing:1px; opacity:.85; margin-bottom:10px;}
  .fc-text{font-size:20px; font-weight:700; line-height:1.4;}
  .fc-hint{position:absolute; bottom:12px; font-size:12px; opacity:.7;}
  .fc-nav{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .fc-nav button{background:var(--card); border:1px solid var(--card2); color:var(--texto); border-radius:12px; padding:10px 18px; font-size:16px; font-weight:700; cursor:pointer;}
  .fc-nav button:active{transform:scale(.95);}
  .fc-count{font-size:14px; color:var(--suave); font-weight:600;}

  /* QUIZ */
  .q-wrap{}
  .q-progress{font-size:13px; color:var(--suave); font-weight:600; margin-bottom:8px; text-align:center;}
  .q-card{background:var(--card); border:1px solid var(--card2); border-radius:18px; padding:18px;}
  .q-text{font-size:18px; font-weight:700; line-height:1.4; margin-bottom:16px;}
  .opt{display:block; width:100%; text-align:left; background:var(--card2); border:2px solid transparent; color:var(--texto); border-radius:12px; padding:13px 14px; font-size:15px; margin-bottom:10px; cursor:pointer; transition:.15s;}
  .opt:hover{border-color:var(--roxo);}
  .opt.correct{background:rgba(34,197,94,.25); border-color:var(--verde);}
  .opt.wrong{background:rgba(239,68,68,.25); border-color:var(--vermelho);}
  .opt:disabled{cursor:default;}
  .feedback{margin-top:6px; padding:12px; border-radius:12px; font-size:14px; line-height:1.4; display:none;}
  .feedback.show{display:block;}
  .feedback.ok{background:rgba(34,197,94,.15); border:1px solid var(--verde);}
  .feedback.no{background:rgba(239,68,68,.15); border:1px solid var(--vermelho);}
  .q-next{width:100%; background:var(--roxo); border:none; color:#fff; border-radius:12px; padding:13px; font-size:16px; font-weight:700; cursor:pointer; margin-top:12px; display:none;}
  .q-next.show{display:block;}

  /* RESULTADO QUIZ */
  .result{text-align:center; padding:24px;}
  .result .emoji{font-size:64px;}
  .result .score{font-size:30px; font-weight:800; margin:10px 0;}
  .result .msg{font-size:16px; color:var(--suave); margin-bottom:18px; line-height:1.4;}
  .result button{background:var(--roxo); border:none; color:#fff; border-radius:12px; padding:12px 24px; font-size:16px; font-weight:700; cursor:pointer;}

  /* CONFETE */
  .confetti{position:fixed; top:-10px; font-size:20px; pointer-events:none; z-index:999; animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(105vh) rotate(540deg); opacity:0;}}

  .reset{display:block; margin:24px auto 0; background:transparent; border:1px solid var(--card2); color:var(--suave); border-radius:10px; padding:8px 16px; font-size:12px; cursor:pointer;}

  /* ===================== TEMA ANIME ===================== */
  .wrap{position:relative; z-index:1;}
  /* pétalas de sakura ao fundo */
  .sakura{position:fixed; top:-24px; z-index:0; pointer-events:none; opacity:.8; animation:cair linear forwards; filter:drop-shadow(0 0 6px rgba(251,191,36,.7));}
  @keyframes cair{
    0%{transform:translateY(0) translateX(0) rotate(0); opacity:0;}
    10%{opacity:.85;}
    50%{transform:translateY(50vh) translateX(40px) rotate(180deg);}
    100%{transform:translateY(110vh) translateX(-30px) rotate(360deg); opacity:0;}
  }
  /* título e cabeçalho com brilho */
  header{padding:22px 0 8px;}
  .kana{font-size:12px; letter-spacing:6px; color:#f87171; opacity:.9; font-weight:800;}
  .avatar{width:84px; height:84px; margin:8px auto 2px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:44px; background:radial-gradient(circle at 50% 35%, #3a1212, #120a0a); border:3px solid #dc2626; box-shadow:0 0 22px rgba(220,38,38,.7), inset 0 0 18px rgba(0,0,0,.6); animation:avatarFloat 3s ease-in-out infinite;}
  @keyframes avatarFloat{50%{transform:translateY(-6px);}}
  header h1{font-size:34px; line-height:1.05; font-weight:900;
    background:linear-gradient(90deg,#fbbf24,#ef4444,#fbbf24);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 0 14px rgba(239,68,68,.8)); animation:pulseGlow 2.4s ease-in-out infinite;}
  @keyframes pulseGlow{0%,100%{filter:drop-shadow(0 0 12px rgba(239,68,68,.6));} 50%{filter:drop-shadow(0 0 26px rgba(251,191,36,.95));}}
  .aluno{margin-top:8px; font-size:16px; font-weight:800; color:#e2e8f0;}
  .aluno b{color:#fde047; text-shadow:0 0 12px rgba(253,224,71,.7);}
  header .sub{color:var(--suave); margin-top:4px; font-size:13px;}
  /* badge de rank com brilho */
  .rankpill{background:linear-gradient(135deg,#dc2626,#7f1d1d); border:none; box-shadow:0 0 16px rgba(220,38,38,.6); color:#fde68a; font-weight:800;}
  /* cartões de matéria com aura ao passar o dedo/mouse */
  .subj{position:relative;}
  .subj:hover{box-shadow:0 0 26px rgba(239,68,68,.5), 0 12px 24px rgba(0,0,0,.45);}
  /* COMBO popup */
  .combo-pop{position:fixed; top:32%; left:50%; transform:translate(-50%,-50%); z-index:1000; pointer-events:none; text-align:center; animation:comboAnim 1.1s ease-out forwards;}
  .combo-pop .cx{display:block; font-size:42px; font-weight:900; color:#fde047; text-shadow:0 0 18px rgba(250,204,21,.9), 0 2px 0 #b45309; font-style:italic;}
  .combo-pop .ce{display:block; font-size:22px; font-weight:900; color:#f472b6; text-shadow:0 0 14px rgba(244,114,182,.9); font-style:italic;}
  @keyframes comboAnim{0%{transform:translate(-50%,-50%) scale(.3) rotate(-8deg); opacity:0;} 25%{transform:translate(-50%,-50%) scale(1.15) rotate(-8deg); opacity:1;} 75%{opacity:1;} 100%{transform:translate(-50%,-90%) scale(1) rotate(-8deg); opacity:0;}}
  /* banner RANK UP */
  .rankup{position:fixed; inset:0; z-index:1001; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; background:radial-gradient(circle, rgba(124,58,237,.4), rgba(0,0,0,.78)); animation:ruIn .4s ease-out;}
  .rankup.out{animation:ruOut .5s ease-in forwards;}
  @keyframes ruIn{from{opacity:0;} to{opacity:1;}}
  @keyframes ruOut{to{opacity:0;}}
  .ru-kana{font-size:16px; letter-spacing:8px; color:#67e8f9; font-weight:800;}
  .ru-title{font-size:52px; font-weight:900; font-style:italic; background:linear-gradient(90deg,#fde047,#f472b6,#22d3ee); -webkit-background-clip:text; background-clip:text; color:transparent; filter:drop-shadow(0 0 20px rgba(253,224,71,.8)); animation:ruPulse .6s ease-in-out infinite alternate;}
  @keyframes ruPulse{to{transform:scale(1.08);}}
  .ru-rank{font-size:26px; font-weight:900; color:#fff; margin-top:8px; text-shadow:0 0 14px rgba(167,139,250,.9);}
  /* avatar clicável */
  .avatar{cursor:pointer;}
  .avatar.comfoto{font-size:0; background-size:cover !important; background-position:center !important;}
  /* menu da Batalha */
  .q-menu{display:flex; flex-direction:column; gap:12px; padding:6px 0;}
  .q-start{background:linear-gradient(135deg,#7c3aed,#dc2626); border:none; color:#fff; border-radius:14px; padding:16px; font-size:17px; font-weight:800; cursor:pointer; box-shadow:0 6px 16px rgba(0,0,0,.35);}
  .q-start:active{transform:scale(.98);}
  .q-start.rev{background:linear-gradient(135deg,#f59e0b,#dc2626);}
  .q-start:disabled{opacity:.5; cursor:default; filter:grayscale(.5);}
  .q-menu-hint{font-size:13px; color:var(--suave); text-align:center; line-height:1.5;}
  /* botões da tela de resultado */
  .result-btns{display:flex; flex-direction:column; gap:10px; align-items:center;}
  .result-btns button{width:100%; max-width:280px;}
  .result-btns .secund{background:var(--card2);}
  /* 4 abas: deixa caber melhor */
  .tabs .tab{font-size:13px; padding:9px 2px;}
  /* AULAS (explicações em sanfona) */
  .licao{background:var(--card); border:1px solid var(--card2); border-radius:14px; margin-bottom:10px; overflow:hidden;}
  .licao-tit{display:flex; justify-content:space-between; align-items:center; gap:10px; padding:14px; cursor:pointer; font-weight:800; font-size:15px;}
  .licao-tit:hover{color:#fcd34d;}
  .licao-tit .seta{color:var(--rosa); font-size:13px; flex-shrink:0;}
  .licao-corpo{display:none; padding:0 14px; font-size:14px; line-height:1.65; color:#dbe3ef;}
  .licao-corpo.aberto{display:block; padding:12px 14px 16px; border-top:1px solid var(--card2);}
  .licao-corpo b{color:#fcd34d;}
  .calc{display:block; white-space:pre; overflow-x:auto; font-family:'Consolas','Courier New',monospace; background:#0d1424; border:1px solid #1e3a5f; border-radius:8px; padding:10px 12px; margin:8px 0; color:#7ee0c0; font-size:14px; line-height:1.5;}
</style>
</head>
<body>
<div class="wrap">

  <!-- ===== HOME ===== -->
  <div id="home" class="screen active">
    <header>
      <div class="kana">スタディ・クエスト</div>
      <div class="avatar" id="avatar" title="Toque para escolher sua foto">🦸</div>
      <input type="file" id="fotoInput" accept="image/*" style="display:none">
      <h1>⚡ MISSÃO PROVA ⚡</h1>
      <div class="aluno">Treinamento de <b id="nomeAluno">Mario</b> 🔥</div>
      <div class="sub">2º Bimestre · 6º Ano · Supere seus limites!</div>
    </header>
    <div class="topbar">
      <div class="pill rankpill"><span id="rankIco">🔰</span> <span id="rank">Recruta Novato</span></div>
      <div class="pill">⚡ Poder: <span class="big" id="xp">0</span></div>
      <div class="pill">🟢 <span class="big" id="totalDone">0</span></div>
    </div>

    <div class="next" id="nextExam"></div>

    <div class="grid" id="subjGrid"></div>

    <button class="reset" onclick="resetTudo()">🔄 Apagar todo o progresso</button>
  </div>

  <!-- ===== MATÉRIA ===== -->
  <div id="subject" class="screen">
    <button class="back" onclick="goHome()">← Voltar</button>
    <div class="subj-head" id="subjHead"></div>
    <div class="tabs">
      <button class="tab on" data-tab="aulas" onclick="setTab('aulas')">📚 Aulas</button>
      <button class="tab" data-tab="check" onclick="setTab('check')">📋 Treino</button>
      <button class="tab" data-tab="cards" onclick="setTab('cards')">🃏 Cartas</button>
      <button class="tab" data-tab="quiz" onclick="setTab('quiz')">⚔️ Batalha</button>
    </div>
    <div id="panel-aulas" class="panel on"></div>
    <div id="panel-check" class="panel"></div>
    <div id="panel-cards" class="panel"></div>
    <div id="panel-quiz" class="panel"></div>
  </div>

</div>

<script>
/* =========================================================
   CONTEÚDO — 6º Ano, 2º Bimestre
   ========================================================= */
const DADOS = {
  ciencias: {
    nome:"Ciências", ico:"🧠", cor:"linear-gradient(135deg,#22c55e,#06b6d4)",
    provas:"📅 Provas: 08/06 (SME) e 12/06 (Prof.)",
    datas:["2026-06-08","2026-06-12"],
    licoes:[
      ["🧠 O sistema nervoso","O sistema nervoso é o 'centro de controle' do corpo: recebe informações do ambiente, interpreta e manda respostas.<br><br>Divisões:<br>• <b>Central (SNC):</b> encéfalo (cérebro, cerebelo e tronco) + medula espinhal.<br>• <b>Periférico (SNP):</b> os nervos espalhados pelo corpo.<br><br>A célula que transmite as mensagens (impulsos elétricos) é o <b>neurônio</b>, e a 'ponte' entre dois neurônios é a <b>sinapse</b>."],
      ["⚡ Respostas voluntárias e involuntárias","• <b>Voluntárias:</b> a gente decide fazer. Ex: levantar a mão, escrever (comando do cérebro).<br>• <b>Involuntárias:</b> acontecem sozinhas. Ex: coração bater, respirar dormindo, digestão.<br><br>O <b>ato reflexo</b> é uma resposta involuntária e muito rápida a um perigo (tirar a mão de algo quente). Quem comanda é a <b>medula espinhal</b> — por isso é tão veloz, nem espera o cérebro."],
      ["🦵 Sistema periférico e os movimentos","O cérebro manda a ordem ('mexa a perna') e o sinal viaja pelos <b>nervos</b> até o <b>músculo</b>, que se contrai e gera o <b>movimento</b>. Os sentidos (visão, tato, audição...) mandam informações de volta pelo mesmo caminho."],
      ["🌱 O ciclo do nitrogênio","O nitrogênio é o gás mais abundante do ar (78%), mas os seres vivos não usam ele direto do ar.<br>1. <b>Bactérias</b> do solo transformam o nitrogênio numa forma que as plantas absorvem pelas raízes.<br>2. As <b>plantas</b> usam para formar proteínas e crescer.<br>3. Os <b>animais</b> comem as plantas e pegam o nitrogênio.<br>4. Quando morrem, os <b>decompositores</b> devolvem ao solo — e o ciclo recomeça."],
      ["♻️ Ciclo dos materiais e o ser humano","Na natureza, materiais como água, carbono e nitrogênio ficam circulando e sendo reaproveitados (nada se perde). O ser humano pode <b>desequilibrar</b> isso com poluição, desmatamento e excesso de adubos químicos. Ajudam: reciclar, reduzir o lixo e evitar poluir."],
      ["🪨 As eras geológicas","A Terra tem mais de 4 bilhões de anos. Para estudar essa história enorme, os cientistas a dividem em grandes períodos: as <b>eras geológicas</b>. Eles descobrem o passado estudando <b>fósseis</b> (restos de seres antigos) e as <b>camadas de rocha</b>. Ex: os dinossauros viveram na era <b>Mesozoica</b>."]
    ],
    topicos:[
      "Como o sistema nervoso percebe e responde aos estímulos",
      "Respostas involuntárias (fora do nosso controle)",
      "Sistema nervoso periférico e os movimentos do corpo",
      "O ciclo do nitrogênio",
      "O ciclo dos materiais e a interferência humana",
      "As eras geológicas da Terra"
    ],
    flashcards:[
      ["Qual é o órgão central do sistema nervoso?","O encéfalo (cérebro, cerebelo e tronco encefálico) junto com a medula espinhal formam o sistema nervoso central."],
      ["O que é um ato reflexo?","É uma resposta rápida e involuntária a um estímulo, comandada pela medula espinhal — como tirar a mão de algo quente sem pensar."],
      ["Qual a célula básica do sistema nervoso?","O neurônio, que transmite impulsos nervosos (mensagens elétricas) pelo corpo."],
      ["O que faz o sistema nervoso periférico?","É formado pelos nervos que ligam o sistema nervoso central ao resto do corpo, levando e trazendo informações dos músculos e órgãos."],
      ["O que é o ciclo do nitrogênio?","É o caminho do nitrogênio entre o ar, o solo, as plantas e os animais. Bactérias transformam o nitrogênio para que as plantas possam usá-lo."],
      ["Como o ser humano interfere nos ciclos dos materiais?","Por poluição, desmatamento e uso de adubos químicos, que podem desequilibrar a natureza."],
      ["O que são eras geológicas?","São grandes períodos da história da Terra, divididos conforme as mudanças do planeta e os seres vivos que existiram em cada época."]

      ["🧱 Fatoração (decompor em fatores primos)","Fatorar é escrever um número como multiplicação de <b>números primos</b> (2, 3, 5, 7, 11...). Divida sempre pelo menor primo possível, até chegar a 1:<span class='calc'>12 | 2\n 6 | 2\n 3 | 3\n 1 |</span>Então 12 = 2 × 2 × 3 = <b>2² × 3</b>.<br><br>Outro exemplo:<span class='calc'>18 | 2\n 9 | 3\n 3 | 3\n 1 |</span>18 = 2 × 3 × 3 = <b>2 × 3²</b>.<br><br>💡 Essa decomposição é a base para calcular o MMC e o MDC pela fatoração."],

      ["📖 Interpretação de texto","Interpretar é entender o que o texto diz e o que ele quer passar. Leia com calma, descubra o <b>assunto principal</b>, preste atenção em quem fala e no sentido de cada parte. A resposta quase sempre se apoia no próprio texto."],
      ["🎭 Conotação e denotação","• <b>Denotativo:</b> sentido real, do dicionário → 'O anel é de ouro'.<br>• <b>Conotativo:</b> sentido figurado → 'Ela tem um coração de ouro' (é bondosa, não é ouro de verdade)."],

      ["🗣️ Variação linguística e sinônimos","• <b>Variação linguística:</b> jeitos diferentes de falar a mesma língua (região, idade, situação) — e não é erro!<br>• <b>Sinônimos:</b> sentido parecido (feliz/contente). <b>Antônimos:</b> sentido oposto (alto/baixo)."],
      ["🔤 Substantivos e verbos","• <b>Substantivo:</b> dá nome a seres, lugares, objetos e sentimentos (cachorro, cidade, amor). Próprio = nome específico com maiúscula (Pedro, Brasil).<br>• <b>Verbo:</b> indica ação ou estado. Tempos: <b>passado</b> (estudou), <b>presente</b> (estuda), <b>futuro</b> (estudará). Quando dá ordem é o imperativo: 'Estude!'."],

function salvar(){ localStorage.setItem("missaoProva", JSON.stringify(estado)); }
function getSubj(id){
  if(!estado[id]) estado[id] = {topicos:{}, quizMelhor:0, erros:{}};
  if(!estado[id].erros) estado[id].erros = {};
  return estado[id];
}

/* =========================================================
   HOME
   ========================================================= */
function diasAte(dataStr){
  const d = new Date(dataStr+"T12:00:00");
  return Math.round((d - HOJE)/(1000*60*60*24));
}
function proximaProva(){
  let melhor=null;
  for(const id in DADOS){
    DADOS[id].datas.forEach(dt=>{
      const dias = diasAte(dt);
      if(dias>=0 && (!melhor || dias<melhor.dias)){
        melhor = {nome:DADOS[id].nome, ico:DADOS[id].ico, dias, dt};
      }
    });
  }
  return melhor;
}
function progressoSubj(id){
  const t = DADOS[id].topicos.length;
  const st = getSubj(id);
  let pontos=0, dominados=0;
  for(let i=0;i<t;i++){
    const lv = nivel(st,i);
    pontos += lv;            // 0, 1 ou 2 pontos por tópico
    if(lv===2) dominados++;  // só "manjo!" conta como dominado
  }
  return {feitos:dominados, t, pontos, pct: t? Math.round(pontos/(t*2)*100):0};
}
function totalTopicosFeitos(){
  let n=0; for(const id in DADOS) n+=progressoSubj(id).feitos; return n;
}
function calcXP(){
  let xp=0;
  for(const id in DADOS){
    xp += progressoSubj(id).pontos*5;        // 5 XP por ponto (🟡=5, 🟢=10)
    xp += (getSubj(id).quizMelhor||0)*5;     // 5 XP por acerto recorde no quiz
  }
  return xp;
}

function renderHome(){
  const xpAtual = calcXP();
  document.getElementById("xp").textContent = xpAtual;
  const r = rank(xpAtual);
  document.getElementById("rank").textContent = r.nome;
  document.getElementById("rankIco").textContent = r.ico;
  document.getElementById("totalDone").textContent = totalTopicosFeitos();
  if(ultimoRank!==null && r.nome!==ultimoRank){ bannerRankUp(r); }
  ultimoRank = r.nome;

  // próxima prova
  const p = proximaProva();
  const box = document.getElementById("nextExam");
  if(p){
    const txt = p.dias===0 ? "É HOJE! 🔥" : p.dias===1 ? "Falta <b>1</b> dia!" : "Faltam <b>"+p.dias+"</b> dias";
    box.innerHTML = `<div class="label">⏰ Próxima prova</div>
      <div class="mat">${p.ico} ${p.nome}</div>
      <div class="dias">${txt}</div>`;
    box.style.display="block";
  } else {
    box.innerHTML = `<div class="mat">🎉 Acabaram as provas!</div><div class="dias">Mandou bem!</div>`;
  }

  // grade de matérias
  const grid = document.getElementById("subjGrid");
  grid.innerHTML="";
  for(const id in DADOS){
    const s = DADOS[id]; const pr = progressoSubj(id);
    const el = document.createElement("button");
    el.className="subj"; el.style.background=s.cor;
    el.onclick=()=>openSubject(id);
    el.innerHTML = `<div class="ico">${s.ico}</div>
      <div class="nm">${s.nome}</div>
      <div class="dt">${s.provas}</div>
      <div class="bar"><div style="width:${pr.pct}%"></div></div>
      <div class="pct">🟢 ${pr.feitos}/${pr.t} dominados · ${pr.pct}%</div>`;
    grid.appendChild(el);
  }
}

/* =========================================================
   NAVEGAÇÃO
   ========================================================= */
let atual=null;
function show(scr){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(scr).classList.add("active");
  window.scrollTo(0,0);
}
function goHome(){ renderHome(); show("home"); }
function openSubject(id){
  atual=id; const s=DADOS[id];
  document.getElementById("subjHead").style.background=s.cor;
  document.getElementById("subjHead").innerHTML =
    `<div class="ico">${s.ico}</div><h2>${s.nome}</h2><div class="dt">${s.provas}</div>`;
  setTab("aulas");
  renderAulas(); renderCheck(); renderCards(); renderQuizMenu();
  show("subject");
}
function setTab(t){
  document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("on", b.dataset.tab===t));
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("on"));
  document.getElementById("panel-"+t).classList.add("on");
}

/* =========================================================
   AULAS (explicações de cada assunto)
   ========================================================= */
function renderAulas(){
  const s=DADOS[atual];
  const wrap=document.getElementById("panel-aulas"); wrap.innerHTML="";
  const intro=document.createElement("div");
  intro.className="legenda";
  intro.innerHTML="📚 Aqui ficam as <b>explicações</b> de cada assunto. Toque para abrir, leia com calma e depois teste no <b>Treino</b> e na <b>Batalha</b>!";
  wrap.appendChild(intro);
  s.licoes.forEach((l,i)=>{
    const item=document.createElement("div");
    item.className="licao";
    item.innerHTML=`<div class="licao-tit" onclick="toggleLicao(${i})"><span>${l[0]}</span><span class="seta" id="seta-${i}">▾</span></div><div class="licao-corpo" id="corpo-${i}">${l[1]}</div>`;
    wrap.appendChild(item);
  });
}
function toggleLicao(i){
  const c=document.getElementById("corpo-"+i), st=document.getElementById("seta-"+i);
  const aberto=c.classList.toggle("aberto");
  st.textContent=aberto?"▴":"▾";
}

/* =========================================================
   CHECKLIST
   ========================================================= */
const NIVEIS=[{ic:"",lab:"ainda não"},{ic:"🤔",lab:"mais ou menos"},{ic:"✓",lab:"manjo!"}];
function nivel(st,i){ const v=st.topicos[i]; if(v===true) return 2; return v||0; }
function renderCheck(){
  const s=DADOS[atual]; const st=getSubj(atual);
  const wrap=document.getElementById("panel-check"); wrap.innerHTML="";
  const legenda=document.createElement("div");
  legenda.className="legenda";
  legenda.innerHTML="👆 Toque em cada tópico para marcar o quanto você sabe:<br>⚪ <b>ainda não</b> → 🟡 <b>mais ou menos</b> → 🟢 <b>manjo!</b>";
  wrap.appendChild(legenda);
  s.topicos.forEach((t,i)=>{
    const lv=nivel(st,i);
    const el=document.createElement("div");
    el.className="topic lvl"+lv;
    el.onclick=()=>{ st.topicos[i]=(nivel(st,i)+1)%3; salvar(); renderCheck(); };
    el.innerHTML=`<div class="check">${NIVEIS[lv].ic}</div><div class="txt">${t}</div><div class="status">${NIVEIS[lv].lab}</div>`;
    wrap.appendChild(el);
  });
}

/* =========================================================
   FLASHCARDS
   ========================================================= */
let fcIndex=0;
function renderCards(){
  fcIndex=0; drawCard();
}
function drawCard(){
  const s=DADOS[atual]; const c=s.flashcards[fcIndex];
  const wrap=document.getElementById("panel-cards");
  wrap.innerHTML=`
    <div class="fc-area">
      <div class="flashcard" id="fcEl" onclick="flipCard()">
        <div class="fc-inner">
          <div class="fc-face fc-front">
            <div class="fc-tag">Pergunta</div>
            <div class="fc-text">${c[0]}</div>
            <div class="fc-hint">👆 toque para ver a resposta</div>
          </div>
          <div class="fc-face fc-back">
            <div class="fc-tag">Resposta</div>
            <div class="fc-text">${c[1]}</div>
            <div class="fc-hint">👆 toque para virar</div>
          </div>
        </div>
      </div>
      <div class="fc-nav">
        <button onclick="prevCard(event)">←</button>
        <div class="fc-count">${fcIndex+1} / ${s.flashcards.length}</div>
        <button onclick="nextCard(event)">→</button>
      </div>
    </div>`;
}
function flipCard(){ document.getElementById("fcEl").classList.toggle("flip"); }
function nextCard(e){ e.stopPropagation(); const n=DADOS[atual].flashcards.length; fcIndex=(fcIndex+1)%n; drawCard(); }
function prevCard(e){ e.stopPropagation(); const n=DADOS[atual].flashcards.length; fcIndex=(fcIndex-1+n)%n; drawCard(); }

/* =========================================================
   QUIZ
   ========================================================= */
let qIndex=0, qScore=0, qAnswered=false, qOrder=[], qCombo=0, qModo="normal";
const QTD_RODADA=20; // quantas perguntas por rodada (sorteadas)
function embaralhar(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function renderQuizMenu(){
  const erros=Object.keys(getSubj(atual).erros).length;
  document.getElementById("panel-quiz").innerHTML=`
    <div class="q-menu">
      <button class="q-start" onclick="renderQuiz('normal')">⚔️ Nova Batalha · 20 perguntas</button>
      <button class="q-start rev" onclick="renderQuiz('erros')" ${erros===0?"disabled":""}>🔁 Revisar o que errei · ${erros}</button>
      <div class="q-menu-hint">${erros===0?"Você ainda não tem erros guardados. Faça uma batalha primeiro! 💪":"Treine de novo só as perguntas que você errou — é o jeito mais rápido de aprender!"}</div>
    </div>`;
}
function renderQuiz(modo){
  modo=modo||"normal"; qModo=modo;
  if(modo==="erros"){
    const ids=Object.keys(getSubj(atual).erros).map(Number);
    if(ids.length===0){ renderQuizMenu(); return; }
    qOrder=embaralhar(ids).slice(0, Math.min(QTD_RODADA, ids.length));
  } else {
    const n=DADOS[atual].quiz.length;
    qOrder=embaralhar([...Array(n).keys()]).slice(0, Math.min(QTD_RODADA,n));
  }
  qIndex=0; qScore=0; qCombo=0; drawQuestion();
}
function drawQuestion(){
  const s=DADOS[atual]; const wrap=document.getElementById("panel-quiz");
  if(qIndex>=qOrder.length){ drawResult(); return; }
  qAnswered=false;
  const q=s.quiz[qOrder[qIndex]];
  let opts="";
  embaralhar([...Array(q[1].length).keys()]).forEach(oi=>{ opts+=`<button class="opt" data-oi="${oi}" onclick="answer(${oi})">${q[1][oi]}</button>`; });
  wrap.innerHTML=`
    <div class="q-wrap">
      <div class="q-progress">${qModo==="erros"?"🔁 Revisão · ":""}Pergunta ${qIndex+1} de ${qOrder.length} · ⭐ ${qScore} acertos</div>
      <div class="q-card">
        <div class="q-text">${q[0]}</div>
        <div id="opts">${opts}</div>
        <div class="feedback" id="fb"></div>
        <button class="q-next" id="qnext" onclick="nextQuestion()">Próxima →</button>
      </div>
    </div>`;
}
function answer(i){
  if(qAnswered) return; qAnswered=true;
  const s=DADOS[atual]; const st=getSubj(atual); const idQ=qOrder[qIndex];
  const q=s.quiz[idQ]; const correta=q[2];
  const botoes=document.querySelectorAll("#opts .opt");
  botoes.forEach(b=>{
    b.disabled=true;
    const oi=parseInt(b.dataset.oi,10);
    if(oi===correta) b.classList.add("correct");
    if(oi===i && i!==correta) b.classList.add("wrong");
  });
  const fb=document.getElementById("fb");
  if(i===correta){ qScore++; qCombo++; delete st.erros[idQ]; fb.className="feedback ok show"; fb.innerHTML="✅ Acertou! "+q[3]; festa(); if(qCombo>=2) comboPop(qCombo); }
  else { qCombo=0; st.erros[idQ]=true; fb.className="feedback no show"; fb.innerHTML="❌ Quase! "+q[3]; }
  salvar();
  document.getElementById("qnext").classList.add("show");
}
function nextQuestion(){ qIndex++; drawQuestion(); }
function drawResult(){
  const s=DADOS[atual]; const st=getSubj(atual); const total=qOrder.length;
  if(qScore > (st.quizMelhor||0)){ st.quizMelhor=qScore; salvar(); }
  const pct=Math.round(qScore/total*100);
  let emoji, msg;
  if(pct===100){ emoji="🏆"; msg="PERFEITO, "+ALUNO+"! Poder máximo desbloqueado! 🔥"; festaGrande(); }
  else if(pct>=70){ emoji="⚡"; msg="Mandou bem! Seu poder está crescendo — continue treinando!"; festa(); }
  else if(pct>=40){ emoji="💪"; msg="Bom combate! Revise o treino e volte mais forte."; }
  else { emoji="🌱"; msg="Todo herói começa do zero. Treine mais e volte pra revanche!"; }
  document.getElementById("panel-quiz").innerHTML=`
    <div class="result">
      <div class="emoji">${emoji}</div>
      <div class="score">${qScore} / ${total}</div>
      <div class="msg">${msg}<br>Recorde nesta matéria: ⭐ ${st.quizMelhor}</div>
      <div class="result-btns">
        <button onclick="renderQuiz('${qModo}')">🔄 Jogar de novo</button>
        <button class="secund" onclick="renderQuizMenu()">↩️ Menu da Batalha</button>
      </div>
    </div>`;
}

/* =========================================================
   CONFETE 🎊
   ========================================================= */
function comboPop(n){
  const frases={3:"BOA!",4:"MANDOU BEM!",5:"INCRÍVEL!",6:"EM CHAMAS! 🔥",7:"IMPARÁVEL!",8:"MONSTRO!",10:"LENDÁRIO! 👑"};
  const extra=frases[n]||"";
  const p=document.createElement("div"); p.className="combo-pop";
  p.innerHTML=`<span class="cx">COMBO x${n}</span>${extra?`<span class="ce">${extra}</span>`:""}`;
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),1100);
}
function petala(){
  const sparks=["✦","✧","⚡","✨"];
  const p=document.createElement("div"); p.className="sakura";
  p.textContent=sparks[Math.floor(Math.random()*sparks.length)];
  p.style.left=(Math.random()*100)+"vw";
  p.style.fontSize=(10+Math.random()*14)+"px";
  p.style.color=Math.random()<0.5?"#fbbf24":"#ef4444";
  p.style.animationDuration=(6+Math.random()*6)+"s";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),12000);
}
function festa(n=18){
  const emojis=["⚡","🌸","💥","✨","⭐","🔥","💫","🌟"];
  for(let i=0;i<n;i++){
    const c=document.createElement("div");
    c.className="confetti"; c.textContent=emojis[i%emojis.length];
    c.style.left=(Math.random()*100)+"vw";
    c.style.animationDuration=(1.5+Math.random()*1.5)+"s";
    c.style.fontSize=(16+Math.random()*16)+"px";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3200);
  }
}
function festaGrande(){ festa(50); }

/* =========================================================
   RESET
   ========================================================= */
function resetTudo(){
  if(confirm("Tem certeza que quer apagar TODO o progresso? Isso não pode ser desfeito.")){
    estado={}; salvar(); renderHome();
  }
}

/* =========================================================
   FOTO DE PERFIL (toque no avatar para escolher uma imagem)
   ========================================================= */
const PERFIL_KEY="missaoPerfilFoto";
function aplicarFoto(src){
  const a=document.getElementById("avatar");
  a.style.backgroundImage="url('"+src+"')";
  a.textContent=""; a.classList.add("comfoto");
}
function carregarPerfil(){
  const salvo=localStorage.getItem(PERFIL_KEY);
  if(salvo){ aplicarFoto(salvo); return; }
  const img=new Image();
  img.onload=()=>aplicarFoto("perfil.jpg");   // se existir um perfil.jpg na pasta, usa sozinho
  img.src="perfil.jpg";
}
document.getElementById("avatar").addEventListener("click", ()=>document.getElementById("fotoInput").click());
document.getElementById("fotoInput").addEventListener("change", (e)=>{
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    const img=new Image();
    img.onload=()=>{
      const size=256, c=document.createElement("canvas"); c.width=size; c.height=size;
      const ctx=c.getContext("2d");
      const m=Math.min(img.width,img.height), sx=(img.width-m)/2, sy=(img.height-m)/2;
      ctx.drawImage(img, sx, sy, m, m, 0, 0, size, size);  // recorta no centro (quadrado)
      let data; try{ data=c.toDataURL("image/jpeg",0.85); }catch(err){ data=ev.target.result; }
      try{ localStorage.setItem(PERFIL_KEY,data); }catch(err){}
      aplicarFoto(data);
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
});
carregarPerfil();

/* INICIAR */
document.getElementById("nomeAluno").textContent = ALUNO;
setInterval(petala, 1300); petala(); petala();
renderHome();

if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>navigator.serviceWorker.register("service-worker.js").catch(()=>{}));
}
